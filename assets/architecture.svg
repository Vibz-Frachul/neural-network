<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A9EFF"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="520" fill="url(#bg)" rx="12"/>
  <rect x="1" y="1" width="898" height="518" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <!-- title -->
  <text x="450" y="40" fill="#e6edf3" font-family="ui-monospace, SFMono-Regular, monospace" font-size="16" font-weight="bold" text-anchor="middle">neural network architecture</text>
  <line x1="200" y1="52" x2="700" y2="52" stroke="#30363d" stroke-width="1"/>

  <!-- input layer -->
  <rect x="40" y="100" width="90" height="320" rx="6" fill="#1a1a2e" stroke="#4A9EFF" stroke-width="1.5" opacity="0.9"/>
  <text x="85" y="85" fill="#4A9EFF" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" text-anchor="middle">INPUT</text>
  <circle cx="85" cy="130" r="10" fill="#4A9EFF" opacity="0.8"/>
  <circle cx="85" cy="170" r="10" fill="#4A9EFF" opacity="0.8"/>
  <circle cx="85" cy="210" r="10" fill="#4A9EFF" opacity="0.8"/>
  <circle cx="85" cy="250" r="10" fill="#4A9EFF" opacity="0.6"/>
  <circle cx="85" cy="290" r="10" fill="#4A9EFF" opacity="0.6"/>
  <circle cx="85" cy="330" r="10" fill="#4A9EFF" opacity="0.4"/>
  <circle cx="85" cy="370" r="10" fill="#4A9EFF" opacity="0.4"/>
  <circle cx="85" cy="405" r="10" fill="#4A9EFF" opacity="0.2"/>

  <!-- hidden layer 1 -->
  <rect x="210" y="90" width="90" height="340" rx="6" fill="#1a1a2e" stroke="#22c55e" stroke-width="1.5" opacity="0.9"/>
  <text x="255" y="75" fill="#22c55e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" text-anchor="middle">HIDDEN 1</text>
  <circle cx="255" cy="120" r="10" fill="#22c55e" opacity="0.9"/>
  <circle cx="255" cy="160" r="10" fill="#22c55e" opacity="0.9"/>
  <circle cx="255" cy="200" r="10" fill="#22c55e" opacity="0.9"/>
  <circle cx="255" cy="240" r="10" fill="#22c55e" opacity="0.9"/>
  <circle cx="255" cy="280" r="10" fill="#22c55e" opacity="0.9"/>
  <circle cx="255" cy="320" r="10" fill="#22c55e" opacity="0.7"/>
  <circle cx="255" cy="360" r="10" fill="#22c55e" opacity="0.6"/>
  <circle cx="255" cy="400" r="10" fill="#22c55e" opacity="0.4"/>

  <!-- hidden layer 2 -->
  <rect x="380" y="110" width="90" height="300" rx="6" fill="#1a1a2e" stroke="#f97316" stroke-width="1.5" opacity="0.9"/>
  <text x="425" y="95" fill="#f97316" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" text-anchor="middle">HIDDEN 2</text>
  <circle cx="425" cy="140" r="10" fill="#f97316" opacity="0.9"/>
  <circle cx="425" cy="185" r="10" fill="#f97316" opacity="0.9"/>
  <circle cx="425" cy="230" r="10" fill="#f97316" opacity="0.9"/>
  <circle cx="425" cy="275" r="10" fill="#f97316" opacity="0.9"/>
  <circle cx="425" cy="320" r="10" fill="#f97316" opacity="0.7"/>
  <circle cx="425" cy="365" r="10" fill="#f97316" opacity="0.6"/>

  <!-- hidden layer 3 -->
  <rect x="550" y="140" width="90" height="240" rx="6" fill="#1a1a2e" stroke="#a855f7" stroke-width="1.5" opacity="0.9"/>
  <text x="595" y="125" fill="#a855f7" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" text-anchor="middle">HIDDEN 3</text>
  <circle cx="595" cy="170" r="10" fill="#a855f7" opacity="0.9"/>
  <circle cx="595" cy="215" r="10" fill="#a855f7" opacity="0.9"/>
  <circle cx="595" cy="260" r="10" fill="#a855f7" opacity="0.9"/>
  <circle cx="595" cy="305" r="10" fill="#a855f7" opacity="0.9"/>
  <circle cx="595" cy="350" r="10" fill="#a855f7" opacity="0.7"/>

  <!-- output layer -->
  <rect x="720" y="200" width="90" height="120" rx="6" fill="#1a1a2e" stroke="#e11d48" stroke-width="1.5" opacity="0.9"/>
  <text x="765" y="185" fill="#e11d48" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" text-anchor="middle">OUTPUT</text>
  <circle cx="765" cy="230" r="10" fill="#e11d48" opacity="0.95"/>
  <circle cx="765" cy="270" r="10" fill="#e11d48" opacity="0.95"/>
  <circle cx="765" cy="310" r="10" fill="#e11d48" opacity="0.95"/>

  <!-- connections: input -> hidden 1 -->
  <g stroke="#30363d" stroke-width="0.8" opacity="0.45">
    <line x1="95" y1="130" x2="200" y2="120"/>
    <line x1="95" y1="170" x2="200" y2="160"/>
    <line x1="95" y1="210" x2="200" y2="200"/>
    <line x1="95" y1="250" x2="200" y2="240"/>
    <line x1="95" y1="290" x2="200" y2="280"/>
    <line x1="95" y1="330" x2="200" y2="320"/>
    <line x1="95" y1="370" x2="200" y2="360"/>
    <line x1="95" y1="405" x2="200" y2="400"/>
  </g>

  <!-- connections: hidden 1 -> hidden 2 -->
  <g stroke="#30363d" stroke-width="0.8" opacity="0.45">
    <line x1="300" y1="120" x2="370" y2="140"/>
    <line x1="300" y1="160" x2="370" y2="185"/>
    <line x1="300" y1="200" x2="370" y2="230"/>
    <line x1="300" y1="240" x2="370" y2="275"/>
    <line x1="300" y1="280" x2="370" y2="320"/>
    <line x1="300" y1="320" x2="370" y2="365"/>
    <line x1="300" y1="360" x2="370" y2="365"/>
    <line x1="300" y1="400" x2="370" y2="365"/>
  </g>

  <!-- connections: hidden 2 -> hidden 3 -->
  <g stroke="#30363d" stroke-width="0.8" opacity="0.45">
    <line x1="470" y1="140" x2="540" y2="170"/>
    <line x1="470" y1="185" x2="540" y2="215"/>
    <line x1="470" y1="230" x2="540" y2="260"/>
    <line x1="470" y1="275" x2="540" y2="305"/>
    <line x1="470" y1="320" x2="540" y2="350"/>
    <line x1="470" y1="365" x2="540" y2="350"/>
  </g>

  <!-- connections: hidden 3 -> output -->
  <g stroke="#30363d" stroke-width="0.8" opacity="0.45">
    <line x1="640" y1="170" x2="710" y2="230"/>
    <line x1="640" y1="215" x2="710" y2="270"/>
    <line x1="640" y1="260" x2="710" y2="270"/>
    <line x1="640" y1="305" x2="710" y2="270"/>
    <line x1="640" y1="350" x2="710" y2="310"/>
  </g>

  <!-- direction labels -->
  <text x="155" y="460" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" text-anchor="middle">forward pass →</text>
  <text x="155" y="478" fill="#4A9EFF" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10" text-anchor="middle" opacity="0.6">← backpropagation</text>

  <!-- legend -->
  <rect x="40" y="490" width="8" height="8" rx="2" fill="#4A9EFF"/>
  <text x="54" y="498" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9">input</text>
  <rect x="120" y="490" width="8" height="8" rx="2" fill="#22c55e"/>
  <text x="134" y="498" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9">hidden</text>
  <rect x="220" y="490" width="8" height="8" rx="2" fill="#e11d48"/>
  <text x="234" y="498" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9">output</text>

  <!-- formula -->
  <text x="765" y="478" fill="#58a6ff" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" text-anchor="middle">y = σ(Wx + b)</text>
</svg>
