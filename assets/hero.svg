<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="800" height="380">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <rect width="800" height="380" fill="url(#bg)" rx="12"/>
  <rect x="1" y="1" width="798" height="378" fill="none" stroke="#30363d" stroke-width="1" rx="12"/>

  <!-- title -->
  <text x="400" y="38" fill="#e6edf3" font-family="ui-monospace, SFMono-Regular, monospace" font-size="18" font-weight="bold" text-anchor="middle">neural network / from scratch</text>
  <text x="400" y="60" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" text-anchor="middle">dari neuron tunggal sampai transformer — dari numpy sampai pytorch</text>
  <line x1="100" y1="76" x2="700" y2="76" stroke="#30363d" stroke-width="1"/>

  <!-- 4 feature boxes -->
  <rect x="40" y="106" width="160" height="98" rx="6" fill="#1a1a2e" stroke="#4A9EFF" stroke-width="1.2"/>
  <text x="120" y="136" fill="#4A9EFF" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" font-weight="bold" text-anchor="middle">docs/</text>
  <text x="120" y="158" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" text-anchor="middle">riset mendalam</text>
  <text x="120" y="174" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" text-anchor="middle">fundamental → arsitektur</text>
  <text x="120" y="190" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" text-anchor="middle">training → framework</text>

  <rect x="220" y="106" width="160" height="98" rx="6" fill="#1a1a2e" stroke="#22c55e" stroke-width="1.2"/>
  <text x="300" y="136" fill="#22c55e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" font-weight="bold" text-anchor="middle">scratch/</text>
  <text x="300" y="158" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" text-anchor="middle">numpy murni</text>
  <text x="300" y="174" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" text-anchor="middle">neuron → mlp → cnn</text>
  <text x="300" y="190" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" text-anchor="middle">backprop manual</text>

  <rect x="400" y="106" width="160" height="98" rx="6" fill="#1a1a2e" stroke="#f97316" stroke-width="1.2"/>
  <text x="480" y="136" fill="#f97316" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" font-weight="bold" text-anchor="middle">pytorch/</text>
  <text x="480" y="158" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" text-anchor="middle">production-ready</text>
  <text x="480" y="174" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" text-anchor="middle">mlp → cnn → lstm</text>
  <text x="480" y="190" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" text-anchor="middle">→ transformer</text>

  <rect x="580" y="106" width="180" height="98" rx="6" fill="#1a1a2e" stroke="#a855f7" stroke-width="1.2"/>
  <text x="670" y="136" fill="#a855f7" font-family="ui-monospace, SFMono-Regular, monospace" font-size="11" font-weight="bold" text-anchor="middle">ci + resources</text>
  <text x="670" y="158" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" text-anchor="middle">github actions</text>
  <text x="670" y="174" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" text-anchor="middle">papers + cheatsheet</text>
  <text x="670" y="190" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="9" text-anchor="middle">diagram arsitektur</text>

  <!-- connecting arrows -->
  <line x1="200" y1="155" x2="215" y2="155" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="218,150 228,155 218,160" fill="#30363d"/>
  <line x1="380" y1="155" x2="395" y2="155" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="398,150 408,155 398,160" fill="#30363d"/>
  <line x1="560" y1="155" x2="575" y2="155" stroke="#30363d" stroke-width="1.5"/>
  <polygon points="578,150 588,155 578,160" fill="#30363d"/>

  <line x1="100" y1="230" x2="700" y2="230" stroke="#30363d" stroke-width="1"/>

  <text x="400" y="256" fill="#e6edf3" font-family="ui-monospace, SFMono-Regular, monospace" font-size="12" text-anchor="middle">setiap baris ditulis manual, setiap konsep dijelaskan dari nol</text>

  <!-- features bullet list -->
  <circle cx="180" cy="288" r="3" fill="#22c55e"/>
  <text x="192" y="292" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10">dokumentasi riset dengan referensi paper</text>

  <circle cx="180" cy="308" r="3" fill="#22c55e"/>
  <text x="192" y="312" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10">kode dari scratch — paham betul apa yang terjadi</text>

  <circle cx="180" cy="328" r="3" fill="#22c55e"/>
  <text x="192" y="332" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10">commentar bahasa indonesia, maximal 3 per file</text>

  <circle cx="540" cy="288" r="3" fill="#22c55e"/>
  <text x="552" y="292" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10">ci otomatis — setiap kode di-test &amp; di-lint</text>

  <circle cx="540" cy="308" r="3" fill="#22c55e"/>
  <text x="552" y="312" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10">tiap file jalan sendiri — no cross-file deps</text>

  <circle cx="540" cy="328" r="3" fill="#22c55e"/>
  <text x="552" y="332" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, monospace" font-size="10">20 files, 2000+ lines, 17 papers dirangkum</text>
</svg>
